[metadata]
name = "ssh-hosts"
description = "A channel to select hosts recorded in your known_hosts file"
requirements = ["awk", "tr", "sed", "ssh"]

[source]
# Skip blank/comment/hashed/marker lines, take the first whitespace field,
# split comma-separated host lists, then drop the [host]:port brackets so
# ssh's own config resolution decides the port.
command = "awk '!/^$|^#|^\\|1\\||^@/ { print $1 }' $HOME/.ssh/known_hosts | tr ',' '\\n' | sed -E 's/^\\[//; s/\\]:[0-9]+$//' | sort -u"

[preview]
# `ssh -G` prints the fully-resolved effective config (hostname, user, port,
# identity file) — exactly what a real `ssh <host>` would use.
command = "ssh -G '{}' 2>/dev/null | head -30"

[keybindings]
enter = "actions:connect"

[actions.connect]
description = "SSH into the selected host"
command = "ssh '{}'"
mode = "execute"
